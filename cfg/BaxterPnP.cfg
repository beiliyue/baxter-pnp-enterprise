#!/usr/bin/env python
"""
Baxter PnP Dynamic Reconfigure Configuration.

动态参数重载 (Dynamic Reconfigure):
  可以在系统运行时动态修改参数，无需重启节点。
  企业级用途：在调试阶段在线调整力控阈值、速度等。

用法:
  rosrun rqt_reconfigure rqt_reconfigure
  → 选择 baxter_pnp_main → 调整滑块

面试问题:
  Q: "dynamic_reconfigure 和 rosparam set 有什么区别？"
  A: "rosparam set 只是修改参数服务器上的值，节点需要自己轮询检查变化。
      dynamic_reconfigure 通过回调主动通知节点参数变更，支持立即响应，
      同时自动生成GUI滑块，适合生产调试。"
"""

PACKAGE = "baxter_pnp_enterprise"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# 力控参数
gen.add("force_threshold", double_t, 0,
        "Force threshold in Newtons (negative = downward)",
        -8.0, -50.0, 0.0)

gen.add("hover_distance", double_t, 0,
        "Distance above target before approach (meters)",
        0.12, 0.01, 0.5)

gen.add("step_size", double_t, 0,
        "Approach step increment (meters)",
        0.05, 0.005, 0.15)

# 布尔选项
gen.add("verbose", bool_t, 0,
        "Enable verbose debug logging",
        True)

gen.add("pause_bt", bool_t, 0,
        "Pause Behavior Tree execution",
        False)

exit(gen.generate(PACKAGE, "baxter_pnp_enterprise", "BaxterPnP"))
